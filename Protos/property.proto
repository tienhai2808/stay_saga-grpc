syntax = "proto3";

package property;

option csharp_namespace = "Grpc.Property";

service PropertyService {
  rpc Ping (PingRequest) returns (EmptyResponse);
  rpc Reserve (ReserveRequest) returns (ReserveResponse);
  rpc Release (ReleaseRequest) returns (EmptyResponse);
}

message ReserveRequest {
  int64 room_type_id = 1;
  int32 guest_count = 2;
  int32 room_count = 3;
  string check_in = 4;
  string check_out = 5;
}

message ReleaseRequest {
  int64 room_type_id = 1;
  int32 room_count = 2;
  string check_in = 3;
  string check_out = 4;
}

message PingRequest {}

message EmptyResponse {}

message ReserveResponse {
  float amount = 1;
}
